# ============================================================
# datos-de-azar — MySQL local para desarrollo
# ============================================================
# Levantar:   docker-compose up -d
# Apagar:     docker-compose down
# Logs:       docker-compose logs -f mysql
# Conectar:   mysql -h 127.0.0.1 -P 3306 -u dev -p datos_azar
# ============================================================

services:
  mysql:
    image: mysql:8.0
    container_name: datos-de-azar-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: datos_azar
      MYSQL_USER: dev
      MYSQL_PASSWORD: devpass
      TZ: America/Santiago
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Init scripts ejecutados automaticamente la PRIMERA vez que se
      # inicializa el volumen mysql_data (ver db/init/01-grants.sql).
      - ./db/init:/docker-entrypoint-initdb.d:ro
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
    driver: local
